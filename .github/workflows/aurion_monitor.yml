name: AURION Monitor 24/7

on:
  schedule:
    - cron: '0 * * * *' # Ejecución cada hora
  workflow_dispatch:    # Ejecución manual

permissions:
  contents: write # Necesario para guardar la memoria (historial) en el repo

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AURION Monitor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push changes to memory
        run: |
          git config --global user.name 'AURION Bot'
          git config --global user.email 'bot@aurion.monitor'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar memoria del agente: $(date)" && git push)